<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎯 Весёлые Координаты!</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  html, body { height: 100%; }
  
  body {
    font-family: 'Comic Sans MS', 'Marker Felt', cursive;
    background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 50%, #a1c4fd 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 10px;
    overflow-y: auto;
  }
  
  .game-container {
    background: white;
    border-radius: 25px;
    padding: 15px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    max-width: 650px;
    width: 100%;
    position: relative;
    border: 4px solid #ff6b9d;
    margin: 10px auto;
  }
  
  h1 {
    text-align: center;
    color: #ff6b9d;
    font-size: 1.7em;
    text-shadow: 2px 2px 0 #ffd93d, 4px 4px 0 rgba(0,0,0,0.1);
    margin-bottom: 10px;
    animation: bounce 2s infinite;
  }
  
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  
  .stats {
    display: flex;
    justify-content: space-around;
    margin-bottom: 10px;
    flex-wrap: wrap;
    gap: 6px;
  }
  
  .stat-box {
    background: linear-gradient(135deg, #ffd93d, #ff9a3c);
    padding: 6px 14px;
    border-radius: 18px;
    color: white;
    font-weight: bold;
    font-size: 0.95em;
    box-shadow: 0 3px 8px rgba(0,0,0,0.15);
    min-width: 90px;
    text-align: center;
  }
  
  .stat-box.score { background: linear-gradient(135deg, #84fab0, #8fd3f4); }
  .stat-box.streak { background: linear-gradient(135deg, #ff6b9d, #c06c84); }
  
  .mode-selector {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  
  .mode-btn {
    padding: 8px 16px;
    border: none;
    border-radius: 20px;
    font-size: 0.95em;
    font-weight: bold;
    cursor: pointer;
    background: #e0e0e0;
    color: #555;
    transition: all 0.3s;
    font-family: inherit;
    box-shadow: 0 3px 0 #bbb;
  }
  
  .mode-btn:hover { transform: translateY(-2px); }
  .mode-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #bbb; }
  .mode-btn.active {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    box-shadow: 0 3px 0 #4a3a8a;
  }
  
  .difficulty {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  
  .diff-btn {
    padding: 6px 12px;
    border: 2px solid #ff6b9d;
    border-radius: 18px;
    background: white;
    color: #ff6b9d;
    font-weight: bold;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.85em;
    transition: all 0.3s;
  }
  
  .diff-btn.active {
    background: #ff6b9d;
    color: white;
  }
  
  .task-area {
    background: linear-gradient(135deg, #fff5e6, #ffe0f0);
    border-radius: 15px;
    padding: 10px;
    margin-bottom: 10px;
    text-align: center;
    border: 2px dashed #ff6b9d;
    min-height: 60px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 6px;
  }
  
  .task-text {
    font-size: 1.1em;
    color: #333;
  }
  
  .coord-display {
    font-size: 1.7em;
    font-weight: bold;
    color: #764ba2;
    background: white;
    padding: 6px 20px;
    border-radius: 12px;
    display: inline-block;
    box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    animation: pulse 1.5s infinite;
  }
  
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }
  
  .input-area {
    display: flex;
    gap: 8px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
  }
  
  .coord-input {
    width: 70px;
    padding: 8px;
    font-size: 1.1em;
    text-align: center;
    border: 3px solid #667eea;
    border-radius: 12px;
    font-family: inherit;
    font-weight: bold;
    color: #333;
  }
  
  .coord-input:focus {
    outline: none;
    border-color: #ff6b9d;
    transform: scale(1.05);
  }
  
  .submit-btn {
    padding: 8px 20px;
    background: linear-gradient(135deg, #43e97b, #38f9d7);
    color: white;
    border: none;
    border-radius: 20px;
    font-size: 1em;
    font-weight: bold;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 4px 0 #2d9a5a;
    transition: all 0.2s;
  }
  
  .submit-btn:hover { transform: translateY(-2px); }
  .submit-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #2d9a5a; }
  
  .canvas-wrapper {
    position: relative;
    background: white;
    border-radius: 15px;
    padding: 5px;
    box-shadow: inset 0 0 15px rgba(0,0,0,0.05);
    margin-bottom: 10px;
    display: flex;
    justify-content: center;
  }
  
  canvas {
    display: block;
    cursor: crosshair;
    border-radius: 12px;
    background: #fafafa;
    max-width: 100%;
    height: auto;
  }
  
  .feedback {
    text-align: center;
    font-size: 1.2em;
    font-weight: bold;
    min-height: 30px;
    margin-bottom: 8px;
    transition: all 0.3s;
  }
  
  .feedback.correct {
    color: #43e97b;
    animation: celebrate 0.6s;
  }
  
  .feedback.wrong {
    color: #ff6b6b;
    animation: shake 0.5s;
  }
  
  @keyframes celebrate {
    0%, 100% { transform: scale(1) rotate(0); }
    25% { transform: scale(1.3) rotate(-5deg); }
    75% { transform: scale(1.3) rotate(5deg); }
  }
  
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }
  
  .confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    pointer-events: none;
    z-index: 1000;
  }
  
  .hint-btn {
    background: linear-gradient(135deg, #ffd93d, #ff9a3c);
    color: white;
    border: none;
    padding: 6px 16px;
    border-radius: 18px;
    cursor: pointer;
    font-family: inherit;
    font-weight: bold;
    box-shadow: 0 3px 0 #c77a2e;
    font-size: 0.9em;
  }
  
  .hint-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #c77a2e; }
  
  .mascot {
    position: absolute;
    top: -20px;
    right: 15px;
    font-size: 2.2em;
    animation: wave 2s infinite;
  }
  
  @keyframes wave {
    0%, 100% { transform: rotate(0); }
    50% { transform: rotate(15deg); }
  }
  
  @media (max-height: 700px) {
    h1 { font-size: 1.4em; margin-bottom: 6px; }
    .task-area { padding: 6px; min-height: 50px; }
    .coord-display { font-size: 1.4em; padding: 4px 15px; }
    .feedback { font-size: 1em; min-height: 24px; }
    .stat-box { padding: 4px 10px; font-size: 0.85em; min-width: 80px; }
    .mascot { font-size: 1.8em; top: -15px; }
  }
</style>
</head>
<body>

<div class="game-container">
  <div class="mascot">🦉</div>
  <h1>🎯 Весёлые Координаты!</h1>
  
  <div class="stats">
    <div class="stat-box score">⭐ <span id="score">0</span></div>
    <div class="stat-box streak">🔥 <span id="streak">0</span></div>
    <div class="stat-box">📊 <span id="question">1</span></div>
  </div>
  
  <div class="mode-selector">
    <button class="mode-btn active" data-mode="findPoint">🎯 Найти точку</button>
    <button class="mode-btn" data-mode="findCoord">📝 Назвать координаты</button>
  </div>
  
  <div class="difficulty">
    <button class="diff-btn active" data-range="5">Легко (-5…5)</button>
    <button class="diff-btn" data-range="10">Средне (-10…10)</button>
    <button class="diff-btn" data-range="15">Сложно (-15…15)</button>
  </div>
  
  <div class="task-area">
    <div class="task-text" id="taskText">Поставь точку с координатами:</div>
    <div class="coord-display" id="coordDisplay">(3, 4)</div>
    <div class="input-area" id="inputArea" style="display:none;">
      <span style="font-size:1.1em; font-weight:bold;">X=</span>
      <input type="number" class="coord-input" id="inputX" placeholder="?">
      <span style="font-size:1.1em; font-weight:bold;">Y=</span>
      <input type="number" class="coord-input" id="inputY" placeholder="?">
      <button class="submit-btn" id="submitBtn">✓</button>
    </div>
  </div>
  
  <div class="canvas-wrapper">
    <canvas id="gameCanvas" width="550" height="550"></canvas>
  </div>
  
  <div class="feedback" id="feedback"></div>
  
  <div style="text-align:center; display:flex; gap:8px; justify-content:center; flex-wrap:wrap;">
    <button class="hint-btn" id="hintBtn">💡 Подсказка</button>
    <button class="hint-btn" id="skipBtn" style="background: linear-gradient(135deg, #a1c4fd, #c2e9fb); box-shadow: 0 3px 0 #5a8ad1;">⏭ Пропустить</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const feedback = document.getElementById('feedback');
const coordDisplay = document.getElementById('coordDisplay');
const taskText = document.getElementById('taskText');
const inputArea = document.getElementById('inputArea');
const inputX = document.getElementById('inputX');
const inputY = document.getElementById('inputY');

let mode = 'findPoint';
let range = 5;
let score = 0;
let streak = 0;
let questionNum = 1;
let targetX = 0, targetY = 0;
let waitingForAnswer = true;
let placedPoints = [];
let hintUsed = false;
let hintRect = null; // для отрисовки подсказки-квадрата

// Звуки
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, duration, type='sine') {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}
function playCorrect() {
  playSound(523, 0.15);
  setTimeout(() => playSound(659, 0.15), 100);
  setTimeout(() => playSound(784, 0.3), 200);
}
function playWrong() {
  playSound(200, 0.3, 'sawtooth');
}

// Адаптивный размер канваса под экран
function resizeCanvas() {
  const wrapper = canvas.parentElement;
  const availW = wrapper.clientWidth - 10;
  // Оценим доступную высоту: окно минус всё вокруг канваса
  const container = document.querySelector('.game-container');
  const containerRect = container.getBoundingClientRect();
  const otherHeight = containerRect.height - canvas.offsetHeight + 20;
  const availH = window.innerHeight - otherHeight - 40;
  
  const size = Math.max(280, Math.min(availW, availH, 550));
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
}

function drawGrid() {
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);
  
  const grad = ctx.createLinearGradient(0, 0, w, h);
  grad.addColorStop(0, '#fffaf0');
  grad.addColorStop(1, '#f0f8ff');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
  
  const cellSize = w / (range * 2 + 1);
  const centerX = w / 2;
  const centerY = h / 2;
  
  // Сетка
  ctx.strokeStyle = '#e0e0e0';
  ctx.lineWidth = 1;
  for (let i = -range; i <= range; i++) {
    const x = centerX + i * cellSize;
    const y = centerY + i * cellSize;
    ctx.beginPath();
    ctx.moveTo(x, 0); ctx.lineTo(x, h);
    ctx.moveTo(0, y); ctx.lineTo(w, y);
    ctx.stroke();
  }
  
  // Оси
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(0, centerY); ctx.lineTo(w, centerY);
  ctx.moveTo(centerX, 0); ctx.lineTo(centerX, h);
  ctx.stroke();
  
  // Стрелки
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.moveTo(w - 10, centerY - 7);
  ctx.lineTo(w, centerY);
  ctx.lineTo(w - 10, centerY + 7);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(centerX - 7, 10);
  ctx.lineTo(centerX, 0);
  ctx.lineTo(centerX + 7, 10);
  ctx.fill();
  
  // Подписи чисел
  ctx.fillStyle = '#333';
  const labelSize = Math.max(10, Math.min(14, cellSize * 0.45));
  ctx.font = `bold ${labelSize}px Comic Sans MS`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  
  for (let i = -range; i <= range; i++) {
    if (i === 0) continue;
    const x = centerX + i * cellSize;
    const y = centerY - i * cellSize;
    ctx.fillText(i, x, centerY + cellSize * 0.55);
    ctx.fillText(i, centerX - cellSize * 0.65, y);
  }
  ctx.fillText('0', centerX - cellSize * 0.5, centerY + cellSize * 0.55);
  
  // Буквы осей
  ctx.font = `bold ${Math.max(12, cellSize * 0.55)}px Comic Sans MS`;
  ctx.fillStyle = '#ff6b9d';
  ctx.fillText('X', w - 18, centerY - 18);
  ctx.fillText('Y', centerX + 18, 18);
  
  // Подсказка-квадрат (если активна)
  if (hintRect) {
    ctx.fillStyle = 'rgba(255, 217, 61, 0.35)';
    ctx.fillRect(hintRect.x, hintRect.y, hintRect.w, hintRect.h);
  }
  
  // Нарисовать точки
  placedPoints.forEach(p => drawPoint(p.x, p.y, p.color, p.showLabel));
}

function coordToPixel(x, y) {
  const w = canvas.width, h = canvas.height;
  const cellSize = w / (range * 2 + 1);
  return {
    px: w/2 + x * cellSize,
    py: h/2 - y * cellSize,
    cellSize: cellSize
  };
}

function pixelToCoord(px, py) {
  const w = canvas.width, h = canvas.height;
  const cellSize = w / (range * 2 + 1);
  return {
    x: Math.round((px - w/2) / cellSize),
    y: Math.round((h/2 - py) / cellSize)
  };
}

function drawPoint(x, y, color = '#667eea', showLabel = true) {
  const {px, py} = coordToPixel(x, y);
  ctx.save();
  
  ctx.shadowColor = 'rgba(0,0,0,0.3)';
  ctx.shadowBlur = 6;
  ctx.shadowOffsetY = 2;
  
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(px, py, 12, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  
  ctx.strokeStyle = 'white';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.arc(px, py, 12, 0, Math.PI * 2);
  ctx.stroke();
  
  if (showLabel) {
    ctx.fillStyle = '#333';
    ctx.font = 'bold 13px Comic Sans MS';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'bottom';
    ctx.fillText(`(${x}, ${y})`, px + 15, py - 4);
  }
}

function newQuestion() {
  waitingForAnswer = true;
  hintUsed = false;
  hintRect = null;
  targetX = Math.floor(Math.random() * (range * 2 + 1)) - range;
  targetY = Math.floor(Math.random() * (range * 2 + 1)) - range;
  
  if (targetX === 0 && targetY === 0) {
    targetX = 1; targetY = 1;
  }
  
  placedPoints = [];
  feedback.textContent = '';
  feedback.className = 'feedback';
  
  if (mode === 'findPoint') {
    taskText.textContent = '🎯 Поставь точку с координатами:';
    coordDisplay.textContent = `(${targetX}, ${targetY})`;
    coordDisplay.style.display = 'inline-block';
    inputArea.style.display = 'none';
    canvas.style.cursor = 'crosshair';
  } else {
    taskText.textContent = '📝 Назови координаты точки:';
    coordDisplay.style.display = 'none';
    inputArea.style.display = 'flex';
    inputX.value = '';
    inputY.value = '';
    setTimeout(() => inputX.focus(), 50);
    canvas.style.cursor = 'default';
    // Точка-вопрос БЕЗ подписи координат
    placedPoints.push({x: targetX, y: targetY, color: '#ff6b9d', showLabel: false});
  }
  
  drawGrid();
  document.getElementById('question').textContent = questionNum;
}

function checkAnswer(userX, userY) {
  if (!waitingForAnswer) return;
  waitingForAnswer = false;
  
  const correct = (userX === targetX && userY === targetY);
  
  if (correct) {
    const points = hintUsed ? 5 : 10;
    score += points + streak * 2;
    streak++;
    feedback.textContent = `🎉 Правильно! +${points + (streak-1)*2}`;
    feedback.className = 'feedback correct';
    playCorrect();
    launchConfetti();
    
    if (mode === 'findPoint') {
      placedPoints.push({x: userX, y: userY, color: '#43e97b', showLabel: true});
    } else {
      // В режиме "назвать" заменим точку на версию с подписью
      placedPoints = [{x: targetX, y: targetY, color: '#43e97b', showLabel: true}];
    }
  } else {
    streak = 0;
    feedback.innerHTML = `❌ Правильно: <b>(${targetX}, ${targetY})</b>`;
    feedback.className = 'feedback wrong';
    playWrong();
    
    if (mode === 'findPoint') {
      placedPoints.push({x: userX, y: userY, color: '#ff6b6b', showLabel: true});
      placedPoints.push({x: targetX, y: targetY, color: '#43e97b', showLabel: true});
    } else {
      // Показать правильную точку с подписью
      placedPoints = [{x: targetX, y: targetY, color: '#43e97b', showLabel: true}];
    }
  }
  
  drawGrid();
  document.getElementById('score').textContent = score;
  document.getElementById('streak').textContent = streak;
  
  setTimeout(() => {
    questionNum++;
    newQuestion();
  }, correct ? 1600 : 2500);
}

canvas.addEventListener('click', (e) => {
  if (mode !== 'findPoint' || !waitingForAnswer) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const px = (e.clientX - rect.left) * scaleX;
  const py = (e.clientY - rect.top) * scaleY;
  const {x, y} = pixelToCoord(px, py);
  
  if (Math.abs(x) <= range && Math.abs(y) <= range) {
    checkAnswer(x, y);
  }
});

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    score = 0; streak = 0; questionNum = 1;
    document.getElementById('score').textContent = 0;
    document.getElementById('streak').textContent = 0;
    newQuestion();
  });
});

document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    range = parseInt(btn.dataset.range);
    newQuestion();
  });
});

document.getElementById('submitBtn').addEventListener('click', () => {
  const x = parseInt(inputX.value);
  const y = parseInt(inputY.value);
  if (!isNaN(x) && !isNaN(y)) {
    checkAnswer(x, y);
  } else {
    feedback.textContent = '✏️ Введи оба числа!';
    feedback.className = 'feedback wrong';
  }
});

[inputX, inputY].forEach(inp => {
  inp.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') document.getElementById('submitBtn').click();
  });
});

document.getElementById('hintBtn').addEventListener('click', () => {
  if (!waitingForAnswer) return;
  hintUsed = true;
  if (mode === 'findPoint') {
    const {px, py, cellSize} = coordToPixel(targetX, targetY);
    hintRect = {
      x: px - cellSize/2,
      y: py - cellSize/2,
      w: cellSize,
      h: cellSize
    };
    feedback.textContent = '💡 Точка в жёлтой клетке!';
    feedback.className = 'feedback';
    drawGrid();
  } else {
    feedback.textContent = `💡 ${targetX >= 0 ? 'Справа от Y' : 'Слева от Y'}, ${targetY >= 0 ? 'выше X' : 'ниже X'}`;
    feedback.className = 'feedback';
  }
});

document.getElementById('skipBtn').addEventListener('click', () => {
  if (!waitingForAnswer) return;
  streak = 0;
  document.getElementById('streak').textContent = 0;
  feedback.innerHTML = `⏭ Ответ: <b>(${targetX}, ${targetY})</b>`;
  feedback.className = 'feedback wrong';
  waitingForAnswer = false;
  if (mode === 'findPoint') {
    placedPoints.push({x: targetX, y: targetY, color: '#43e97b', showLabel: true});
  } else {
    placedPoints = [{x: targetX, y: targetY, color: '#43e97b', showLabel: true}];
  }
  drawGrid();
  setTimeout(() => { questionNum++; newQuestion(); }, 1500);
});

function launchConfetti() {
  const colors = ['#ff6b9d', '#ffd93d', '#43e97b', '#667eea', '#ff9a3c', '#a1c4fd'];
  for (let i = 0; i < 40; i++) {
    const conf = document.createElement('div');
    conf.className = 'confetti';
    conf.style.background = colors[Math.floor(Math.random() * colors.length)];
    conf.style.left = Math.random() * 100 + 'vw';
    conf.style.top = '-20px';
    conf.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
    document.body.appendChild(conf);
    
    const duration = 1500 + Math.random() * 1500;
    const xEnd = (Math.random() - 0.5) * 300;
    conf.animate([
      { transform: 'translate(0, 0) rotate(0deg)', opacity: 1 },
      { transform: `translate(${xEnd}px, 100vh) rotate(${Math.random()*720}deg)`, opacity: 0 }
    ], { duration, easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)' });
    
    setTimeout(() => conf.remove(), duration);
  }
}

window.addEventListener('resize', () => { resizeCanvas(); drawGrid(); });
resizeCanvas();
newQuestion();
</script>
